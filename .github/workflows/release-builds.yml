name: Build desktop releases

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: zapcast-macos-arm64
            forge_args: --arch=arm64
          - os: macos-15-intel
            artifact: zapcast-macos-x64
            forge_args: --arch=x64
          - os: windows-latest
            artifact: zapcast-windows-x64
            forge_args: --arch=x64
          - os: ubuntu-latest
            artifact: zapcast-linux-x64
            forge_args: --arch=x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run make -- ${{ matrix.forge_args }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: out/make/**/*
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          fail_on_unmatched_files: true
